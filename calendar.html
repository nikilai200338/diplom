<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Календарь — Voskresensky</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400..900&family=Golos+Text:wght@400..900&family=Space+Grotesk:wght@300..700&family=Unbounded:wght@400..900&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body data-page="calendar">
  <header class="header">
    <div class="header__container">
      <nav class="header__nav">
        <a href="index.html"><img src="img/favicon.svg" alt="Voskresensky" width="36" height="36"></a>
        <ul class="header__list">
          <li class="header__list-item"><a class="header__list-link" href="index.html">Главная</a></li>
          <li class="header__list-item"><a class="header__list-link" href="performers.html">Исполнители</a></li>
          <li class="header__list-item active"><a class="header__list-link" href="calendar.html">Календарь</a></li>
          <li class="header__list-item"><a class="header__list-link" href="projects-page.html">Проекты</a></li>
          <li class="header__list-item"><a class="header__list-link" href="finances.html">Финансы</a></li>
          <li class="header__list-item"><a class="header__list-link" href="map.html">Карта</a></li>
        </ul>
        <a class="header__button" href="login.html">Сменить аккаунт</a>
      </nav>
    </div>
  </header>

  <main class="app-shell">
    <section class="page-top">
      <div>
        <h1 class="page-title">Календарь</h1>
        <p class="page-subtitle">День, неделя, месяц, задачи по времени, календари исполнителей и автоматические дедлайны проектов.</p>
      </div>
      <div class="page-actions">
        <button class="btn btn--green" data-action="open-event-create">Добавить событие</button>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <button id="cal-prev" class="btn">Назад</button>
        <button id="cal-today" class="btn btn--ghost">Сегодня</button>
        <button id="cal-next" class="btn">Вперёд</button>
        <strong id="calendar-title" class="section-title"></strong>
        <select id="calendar-view" class="select hide" style="max-width:160px">
          <option value="month">Месяц</option>
          <option value="week">Неделя</option>
          <option value="day">День по часам</option>
        </select>
        <select id="calendar-project" class="select" style="max-width:220px"></select>
        <select id="calendar-performer" class="select" style="max-width:220px"></select>
        <div class="calendar-view-switch" aria-label="Переключение вида календаря">
          <button class="calendar-view-switch__btn active" data-calendar-mode="month">Месяц</button>
          <button class="calendar-view-switch__btn" data-calendar-mode="week">Неделя</button>
          <button class="calendar-view-switch__btn" data-calendar-mode="day">День</button>
        </div>
      </div>
      <div id="calendar-root" style="margin-top:16px"></div>
    </section>
  </main>

  <div id="app-modal" class="modal" aria-hidden="true"></div>
</body>
</html>
