<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта съёмок — Voskresensky</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400..900&family=Golos+Text:wght@400..900&family=Space+Grotesk:wght@300..700&family=Unbounded:wght@400..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body data-page="map">
  <header class="header">
    <div class="header__container">
      <nav class="header__nav">
        <a href="index.html"><img src="img/favicon.svg" alt="Voskresensky" width="36" height="36"></a>
        <ul class="header__list">
          <li class="header__list-item"><a class="header__list-link" href="index.html">Главная</a></li>
          <li class="header__list-item"><a class="header__list-link" href="performers.html">Исполнители</a></li>
          <li class="header__list-item"><a class="header__list-link" href="calendar.html">Календарь</a></li>
          <li class="header__list-item"><a class="header__list-link" href="projects-page.html">Проекты</a></li>
          <li class="header__list-item"><a class="header__list-link" href="finances.html">Финансы</a></li>
          <li class="header__list-item active"><a class="header__list-link" href="map.html">Карта</a></li>
        </ul>
        <a class="header__button" href="login.html">Сменить аккаунт</a>
      </nav>
    </div>
  </header>

  <main class="app-shell">
    <section class="page-top">
      <div>
        <h1 class="page-title">Карта съёмок</h1>
        <p class="page-subtitle">Точки автоматически собираются из проектов: локация, период съёмки, клиент, статус и тепловые зоны активности.</p>
      </div>
      <div class="page-actions">
        <button class="btn" data-export="map">Экспорт точек</button>
        <button class="btn btn--green" id="download-map">Скачать PNG</button>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <select id="map-period" class="select" style="max-width:220px">
          <option value="all">Все периоды</option>
          <option value="day">Сегодня</option>
          <option value="week">Неделя</option>
          <option value="month">Месяц</option>
          <option value="custom">Произвольный диапазон</option>
        </select>
        <input id="map-date-start" class="input" type="date" style="max-width:180px">
        <input id="map-date-end" class="input" type="date" style="max-width:180px">
        <select id="map-status" class="select" style="max-width:220px"></select>
      </div>
      <div id="map-capture" class="map-print-card" style="margin-top:16px">
        <div id="shooting-map" class="map-box"></div>
      </div>
      <div id="map-list" class="grid grid--3" style="margin-top:16px"></div>
    </section>
  </main>

  <div id="app-modal" class="modal" aria-hidden="true"></div>
</body>
</html>
