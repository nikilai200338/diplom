<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Финансы — Voskresensky</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400..900&family=Golos+Text:wght@400..900&family=Space+Grotesk:wght@300..700&family=Unbounded:wght@400..900&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body data-page="finances">
  <header class="header">
    <div class="header__container">
      <nav class="header__nav">
        <a href="index.html"><img src="img/favicon.svg" alt="Voskresensky" width="36" height="36"></a>
        <ul class="header__list">
          <li class="header__list-item"><a class="header__list-link" href="index.html">Главная</a></li>
          <li class="header__list-item"><a class="header__list-link" href="performers.html">Исполнители</a></li>
          <li class="header__list-item"><a class="header__list-link" href="calendar.html">Календарь</a></li>
          <li class="header__list-item"><a class="header__list-link" href="projects-page.html">Проекты</a></li>
          <li class="header__list-item active"><a class="header__list-link" href="finances.html">Финансы</a></li>
          <li class="header__list-item"><a class="header__list-link" href="map.html">Карта</a></li>
        </ul>
        <a class="header__button" href="login.html">Сменить аккаунт</a>
      </nav>
    </div>
  </header>

  <main class="app-shell">
    <section class="page-top">
      <div>
        <h1 class="page-title">Финансы</h1>
        <p class="page-subtitle">Доходы, проектные и общие расходы, аренда оборудования, чеки, счета, документы и экспорт.</p>
      </div>
      <div class="page-actions">
        <button class="btn" data-export="finances">Экспорт финансов</button>
        <button class="btn" data-export="expenses">Экспорт расходов</button>
        <button class="btn" data-export="documents">Экспорт документов</button>
        <button class="btn btn--green" data-action="open-expense-create">Добавить трату</button>
      </div>
    </section>

    <section id="finance-kpis" class="grid grid--4"></section>

    <section class="grid grid--2" style="margin-top:18px">
      <div class="panel">
        <div class="section-head">
          <h2 class="section-title">Динамика доходов и расходов</h2>
        </div>
        <canvas id="finance-line" class="finance-chart"></canvas>
      </div>
      <div class="panel">
        <div class="section-head">
          <h2 class="section-title">Расходы по категориям</h2>
        </div>
        <canvas id="finance-pie" class="finance-chart"></canvas>
      </div>
    </section>

    <section class="panel" style="margin-top:18px">
      <div class="tabs">
        <button class="tab active" data-finance-tab="projects">Проекты</button>
        <button class="tab" data-finance-tab="expenses">Расходы</button>
        <button class="tab" data-finance-tab="documents">Документы</button>
      </div>
      <div id="finance-tab-content"></div>
    </section>
  </main>

  <div id="app-modal" class="modal" aria-hidden="true"></div>
</body>
</html>
