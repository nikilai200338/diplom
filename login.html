<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Войти — Voskresensky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --dark: #191A23; --grey: #F3F3F3; --green: #B9FF66;
      --white: #ffffff; --border: rgba(25,26,35,.14);
      --radius: 12px; --shadow-md: 0 6px 24px rgba(25,26,35,.10);
    }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--grey); color: var(--dark); min-height: 100dvh; display: flex; align-items: center; justify-content: center; }

    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-md);
      width: 100%; max-width: 420px; padding: 40px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-mark { width: 36px; height: 36px; background: var(--dark); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .logo-mark svg { color: var(--green); }
    .logo-text { font-size: 18px; font-weight: 700; }

    h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: rgba(25,26,35,.5); margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 14px; border: 1px solid rgba(25,26,35,.25);
      border-radius: 8px; font-size: 15px; font-family: inherit;
      background: var(--grey); color: var(--dark); outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    .form-group input:focus { border-color: var(--dark); box-shadow: 0 0 0 3px rgba(185,255,102,.4); }

    .btn-login {
      width: 100%; padding: 13px; background: var(--dark); color: var(--green);
      border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: opacity .18s; margin-top: 6px;
    }
    .btn-login:hover { opacity: .85; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .error-msg {
      background: #fde8e8; border: 1px solid #d9534f; border-radius: 8px;
      padding: 10px 14px; font-size: 14px; color: #c0392b;
      margin-bottom: 16px; display: none;
    }
    .role-hint {
      margin-top: 24px; padding: 14px; background: var(--grey);
      border-radius: 8px; font-size: 12px; color: rgba(25,26,35,.6);
    }
    .role-hint b { color: var(--dark); }
    .role-hint ul { margin-top: 6px; padding-left: 16px; }
    .role-hint li { margin-bottom: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B9FF66" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </div>
      <span class="logo-text">Voskresensky Studio</span>
    </div>

    <h1>Добро пожаловать</h1>
    <p class="subtitle">Войдите в систему управления производством</p>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@voskresensky.ru" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="submit-btn">Войти</button>
    </form>

    <div class="role-hint">
      <b>Тестовые аккаунты:</b>
      <ul>
        <li>admin@voskresensky.ru / admin123</li>
        <li>op1@voskresensky.ru / op1pass</li>
        <li>client@veka.ru / vekaclient</li>
      </ul>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    // Уже авторизован — редирект
    if (Auth.isAuthenticated()) window.location.href = 'index.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Входим...';

      try {
        const { token, user } = await api.auth.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        Auth.save(token, user);

        // Разные стартовые страницы по ролям
        const redirect = { admin: 'index.html', manager: 'index.html', performer: 'projects-page.html', client: 'projects-page.html' };
        window.location.href = redirect[user.role] || 'index.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    });
  </script>
</body>
</html>
