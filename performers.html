<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Исполнители — Voskresensky</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400..900&family=Golos+Text:wght@400..900&family=Space+Grotesk:wght@300..700&family=Unbounded:wght@400..900&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body data-page="performers">
  <header class="header">
    <div class="header__container">
      <nav class="header__nav">
        <a href="index.html"><img src="img/favicon.svg" alt="Voskresensky" width="36" height="36"></a>
        <ul class="header__list">
          <li class="header__list-item"><a class="header__list-link" href="index.html">Главная</a></li>
          <li class="header__list-item active"><a class="header__list-link" href="performers.html">Исполнители</a></li>
          <li class="header__list-item"><a class="header__list-link" href="calendar.html">Календарь</a></li>
          <li class="header__list-item"><a class="header__list-link" href="projects-page.html">Проекты</a></li>
          <li class="header__list-item"><a class="header__list-link" href="finances.html">Финансы</a></li>
          <li class="header__list-item"><a class="header__list-link" href="map.html">Карта</a></li>
        </ul>
        <a class="header__button" href="login.html">Сменить аккаунт</a>
      </nav>
    </div>
  </header>

  <main class="app-shell">
    <section class="page-top">
      <div>
        <h1 class="page-title">Исполнители</h1>
        <p class="page-subtitle">База команды с ролями, ставками, занятостью, дедлайнами и экспортом в XLSX.</p>
      </div>
      <div class="page-actions">
        <button class="btn" data-export="performers">Экспорт .xlsx</button>
        <button class="btn btn--green" data-action="open-performer-create">Добавить исполнителя</button>
      </div>
    </section>

    <section id="performer-kpis" class="grid grid--4"></section>

    <section class="panel" style="margin-top:18px">
      <div class="filters">
        <input id="performer-search" class="input" type="search" placeholder="Поиск по имени, роли, email">
        <select id="performer-role" class="select"></select>
        <select id="performer-status" class="select">
          <option value="">Все статусы</option>
          <option value="Свободен">Свободен</option>
          <option value="Занят">Занят</option>
          <option value="На проекте">На проекте</option>
        </select>
        <select id="performer-sort" class="select">
          <option value="deadline">Сортировка: ближайший дедлайн</option>
          <option value="rate-desc">Ставка: по убыванию</option>
          <option value="rate-asc">Ставка: по возрастанию</option>
          <option value="completed-desc">Выполненные проекты</option>
          <option value="active-desc">Проекты в работе</option>
        </select>
        <button class="btn btn--ghost" data-action="reset-performer-filters">Сбросить</button>
      </div>
      <div id="performers-grid" class="grid grid--3"></div>
    </section>
  </main>

  <div id="app-modal" class="modal" aria-hidden="true"></div>
</body>
</html>
